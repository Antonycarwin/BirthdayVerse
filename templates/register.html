{% extends "base.html" %}

{% block title %}Register | BirthdayVerse{% endblock %}

{% block content %}

<div class="row justify-content-center py-5">

    <div class="col-lg-7">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h1 class="display-6 fw-bold text-primary">
                        🎂 BirthdayVerse
                    </h1>

                    <p class="text-muted">
                        Create Your Account
                    </p>

                </div>

                <form
                    method="POST"
                    action="/register"
                    enctype="multipart/form-data">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                class="form-control form-control-lg"
                                name="name"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control form-control-lg"
                                name="email"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                                type="text"
                                class="form-control form-control-lg"
                                name="phone">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Birthday
                            </label>

                            <input
                                type="date"
                                class="form-control form-control-lg"
                                name="birthday"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                class="form-control form-control-lg"
                                name="password"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input
                                type="password"
                                class="form-control form-control-lg"
                                name="confirm_password"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Gender
                            </label>

                            <select
                                class="form-select form-select-lg"
                                name="gender">

                                <option value="">Select Gender</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label">
                                Profile Picture
                            </label>

                            <input
                                type="file"
                                class="form-control form-control-lg"
                                name="profile_image"
                                accept="image/*">

                        </div>

                    </div>

                    <div class="d-grid">

                        <button
                            class="btn btn-primary btn-lg">

                            Create Account

                        </button>

                    </div>

                </form>

                <hr>

                <div class="text-center">

                    Already have an account?

                    <a href="/login">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
